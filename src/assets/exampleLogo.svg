<?xml version="1.0" encoding="UTF-8"?>
<svg
    xmlns="http://www.w3.org/2000/svg"
    width="300"
    height="80"
    viewBox="0 0 300 80"
    role="img"
    aria-labelledby="title"
>
  <title id="title">Saber Bank Logo</title>

  <!-- Background rectangle (optional) -->
  <rect width="300" height="80" fill="#ffffff"/>

  <!-- “S” Shield icon -->
  <g transform="translate(20, 10)">
    <path
      d="M10 0 L50 0 C70 0 80 20 60 30 C80 40 70 60 50 60 L10 60 C0 60 0 48 10 48 L10 48 C20 48 30 42 30 30 C30 18 20 12 10 12 Z"
      fill="#005bb5"
